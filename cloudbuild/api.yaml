steps:
  # 1. build
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/works-logue/api:$COMMIT_SHA
      - ./backend

  # 2. push
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/works-logue/api:$COMMIT_SHA

  # 3. deploy
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - works-logue-api-dev
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/works-logue/api:$COMMIT_SHA
      - --region=asia-northeast1
      - --platform=managed
      - --service-account=works-logue-api-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --add-cloudsql-instances=works-logue:asia-northeast1:works-logue-db-dev
      - --set-env-vars=NODE_ENV=production,ALLOW_LOCALHOST=true
      - --set-secrets=AUTH0_DOMAIN=AUTH0_DOMAIN:latest,AUTH0_ISSUER=AUTH0_ISSUER:latest,AUTH0_AUDIENCE=AUTH0_AUDIENCE:latest,DATABASE_URL=DATABASE_URL:latest

options:
  logging: CLOUD_LOGGING_ONLY
